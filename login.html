<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Sign In — BLEE Quant Analytics</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,system-ui,'Segoe UI',sans-serif;
       background:#0a0f1e;color:#fff;min-height:100vh;
       display:flex;flex-direction:column;align-items:center;
       justify-content:center;padding:24px;}
  .card{background:#111827;border:1px solid #1f2937;border-radius:14px;
        padding:36px 40px;width:100%;max-width:420px;}
  .logo{font-size:20px;font-weight:800;color:#f5a623;letter-spacing:0.05em;margin-bottom:6px;}
  .logo span{color:#fff;}
  .subtitle{font-size:13px;color:#6b7280;margin-bottom:28px;}
  .plan-banner{background:#1a2033;border:1px solid #2d3f60;border-radius:8px;
               padding:10px 14px;margin-bottom:18px;font-size:13px;
               display:none;align-items:center;gap:10px;}
  .plan-banner .plan-icon{font-size:20px;}
  .plan-banner .plan-text{flex:1;}
  .plan-banner .plan-name{font-weight:700;color:#fff;}
  .plan-banner .plan-sub{color:#6b7280;font-size:11px;}
  .tabs{display:flex;gap:0;margin-bottom:24px;border-bottom:1px solid #1f2937;}
  .tab{flex:1;text-align:center;padding:10px;font-size:14px;font-weight:600;
       cursor:pointer;color:#6b7280;border-bottom:2px solid transparent;transition:all .2s;}
  .tab.active{color:#f5a623;border-bottom-color:#f5a623;}
  label{display:block;font-size:11px;color:#9ca3af;font-weight:600;
        text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;}
  input{width:100%;padding:10px 12px;background:#1f2937;border:1px solid #374151;
        border-radius:8px;color:#fff;font-size:14px;margin-bottom:14px;}
  input:focus{outline:none;border-color:#f5a623;}
  input::placeholder{color:#4b5563;}
  .btn{width:100%;padding:12px;border:0;border-radius:8px;font-size:15px;
       font-weight:700;cursor:pointer;transition:opacity .2s;}
  .btn-primary{background:#f5a623;color:#000;}
  .btn-primary:hover{opacity:.9;}
  .btn-google{background:#fff;color:#111;display:flex;align-items:center;
              justify-content:center;gap:10px;margin-top:10px;}
  .btn-google:hover{opacity:.9;}
  .divider{display:flex;align-items:center;gap:10px;margin:16px 0;color:#4b5563;font-size:12px;}
  .divider::before,.divider::after{content:'';flex:1;border-top:1px solid #1f2937;}
  .msg{padding:10px 12px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none;}
  .msg.error{background:#3b0a14;color:#f87171;border:1px solid #7f1d1d;}
  .msg.success{background:#052e16;color:#4ade80;border:1px solid #14532d;}
  .forgot{text-align:right;margin-top:-8px;margin-bottom:14px;}
  .forgot a{color:#f5a623;font-size:12px;text-decoration:none;}
  .terms{font-size:11px;color:#6b7280;margin-top:12px;text-align:center;}
  .terms a{color:#f5a623;text-decoration:none;}
  .back{text-align:center;margin-top:20px;font-size:13px;color:#6b7280;}
  .back a{color:#f5a623;text-decoration:none;}
</style>
</head>
<body>

<div class="card">
  <div class="logo">BLEE <span>Quant</span></div>
  <div class="subtitle" id="page-subtitle">Member portal — sign in to access your signals</div>

  <div class="tabs">
    <div class="tab active" id="tab-login"  onclick="showTab('login')">Sign In</div>
    <div class="tab"        id="tab-signup" onclick="showTab('signup')">Create Account</div>
  </div>

  <div id="msg" class="msg"></div>

  <!-- ── SIGN IN ── -->
  <div id="panel-login">
    <label>Email</label>
    <input id="li-email" type="email" placeholder="you@example.com" autocomplete="email"/>
    <label>Password</label>
    <input id="li-pass" type="password" placeholder="••••••••" autocomplete="current-password"/>
    <div class="forgot"><a href="#" onclick="forgotPassword()">Forgot password?</a></div>
    <button class="btn btn-primary" onclick="signIn()">Sign In</button>
    <div class="divider">or</div>
    <button class="btn btn-google" onclick="signInGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.1 0 5.9 1.1 8.1 2.9l6-6C34.4 3.1 29.5 1 24 1 14.9 1 7.2 6.4 3.6 14.1l7 5.4C12.4 13.1 17.7 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.4 5.7c4.3-4 6.7-9.9 7.2-16.9z"/>
        <path fill="#FBBC05" d="M10.6 28.5A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.1.7-4.5l-7-5.4A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.6 10.7l7.4-5.7c-.2-.8-.4-1.6-.4-2.5z"/>
        <path fill="#34A853" d="M24 47c5.5 0 10.1-1.8 13.5-4.9l-7.4-5.7c-1.8 1.2-4.1 2-6.1 2-6.3 0-11.6-3.6-13.4-8.9l-7.4 5.7C7.2 41.6 14.9 47 24 47z"/>
      </svg>
      Continue with Google
    </button>
  </div>

  <!-- ── SIGN UP ── -->
  <div id="panel-signup" style="display:none;">
    <!-- Plan banner shown when coming from subscribe page -->
    <div class="plan-banner" id="plan-banner">
      <div class="plan-icon" id="plan-icon">📧</div>
      <div class="plan-text">
        <div class="plan-name" id="plan-name">Free Newsletter</div>
        <div class="plan-sub" id="plan-sub">You're registering for this plan</div>
      </div>
    </div>

    <label>Email</label>
    <input id="su-email" type="email" placeholder="you@example.com" autocomplete="email"/>
    <label>Password <span style="color:#4b5563;font-weight:400;">(min 8 characters)</span></label>
    <input id="su-pass" type="password" placeholder="••••••••" autocomplete="new-password"/>
    <label>Confirm Password</label>
    <input id="su-pass2" type="password" placeholder="••••••••"/>
    <label>Security Hint <span style="color:#4b5563;font-weight:400;">(e.g. "My dog's name")</span></label>
    <input id="su-hint" type="text" placeholder="A memorable hint for yourself"/>
    <button class="btn btn-primary" onclick="signUp()">Create Account</button>
    <div class="divider">or</div>
    <button class="btn btn-google" onclick="signInGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.1 0 5.9 1.1 8.1 2.9l6-6C34.4 3.1 29.5 1 24 1 14.9 1 7.2 6.4 3.6 14.1l7 5.4C12.4 13.1 17.7 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.4 5.7c4.3-4 6.7-9.9 7.2-16.9z"/>
        <path fill="#FBBC05" d="M10.6 28.5A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.1.7-4.5l-7-5.4A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.6 10.7l7.4-5.7c-.2-.8-.4-1.6-.4-2.5z"/>
        <path fill="#34A853" d="M24 47c5.5 0 10.1-1.8 13.5-4.9l-7.4-5.7c-1.8 1.2-4.1 2-6.1 2-6.3 0-11.6-3.6-13.4-8.9l-7.4 5.7C7.2 41.6 14.9 47 24 47z"/>
      </svg>
      Continue with Google
    </button>
    <div class="terms">
      By creating an account you agree to our
      <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
    </div>
  </div>
</div>

<div class="back"><a href="index.html">← Back to BLEE Quant home</a></div>

<!-- Local file bypass: skip login entirely -->
<script>
  if (window.location.protocol === "file:") {
    const p = new URLSearchParams(window.location.search);
    window.location.replace(p.get("next") || "index.html");
  }
</script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();
const db   = firebase.firestore();

// ── URL params ───────────────────────────────────────────────────────────
const urlParams   = new URLSearchParams(window.location.search);
const planParam   = urlParams.get("plan")      || "";  // free | starter | pro
const tabParam    = urlParams.get("tab")       || "";
const nextParam   = urlParams.get("next")      || "";
const promoParam  = urlParams.get("promoCode") || "";  // referral promo code

// ── Plan definitions ─────────────────────────────────────────────────────
const PLANS = {
  free:    { tier:"free",    status:"active",  icon:"📧", name:"Free Newsletter",  sub:"Instant access · No credit card needed" },
  starter: { tier:"basic",   status:"pending", icon:"⭐", name:"Starter — $19/mo", sub:"Admin will activate your access within 24 hours" },
  pro:     { tier:"premium", status:"pending", icon:"🚀", name:"Pro — $49/mo",     sub:"Admin will activate your access within 24 hours" },
};

// ── Auto-switch tab & show plan banner ───────────────────────────────────
if (tabParam === "signup") showTab("signup");

if (planParam && PLANS[planParam]) {
  const p = PLANS[planParam];
  document.getElementById("plan-banner").style.display = "flex";
  document.getElementById("plan-icon").textContent = p.icon;
  document.getElementById("plan-name").textContent = p.name;
  document.getElementById("plan-sub").textContent  = p.sub;
  document.getElementById("page-subtitle").textContent = "Create your account to get started";
}

// ── Redirect if already logged in ───────────────────────────────────────
auth.onAuthStateChanged(async user => {
  if (!user) return;
  // Super-admin by email → admin dashboard
  if (user.email === BLEE_ADMIN_EMAIL) {
    window.location.href = nextParam || BLEE_PAGES.admin;
    return;
  }
  // Check Firestore tier for admin/manager redirect
  try {
    const snap = await db.collection("users").doc(user.uid).get();
    if (snap.exists) {
      const tier = snap.data().tier;
      if (tier === "admin" || tier === "manager") {
        window.location.href = nextParam || BLEE_PAGES.admin;
        return;
      }
      if (tier === "marketer") {
        window.location.href = nextParam || (BLEE_PAGES.marketing || "marketing.html");
        return;
      }
    }
  } catch (e) { /* ignore — fall through to default */ }
  window.location.href = nextParam || BLEE_PAGES.signal;
});

function showTab(tab) {
  document.getElementById("panel-login").style.display  = tab === "login"  ? "" : "none";
  document.getElementById("panel-signup").style.display = tab === "signup" ? "" : "none";
  document.getElementById("tab-login").classList.toggle("active",  tab === "login");
  document.getElementById("tab-signup").classList.toggle("active", tab === "signup");
  clearMsg();
}
function showMsg(txt, type) {
  const el = document.getElementById("msg");
  el.textContent = txt; el.className = "msg " + type; el.style.display = "block";
}
function clearMsg() { document.getElementById("msg").style.display = "none"; }

// ── Sign In ──────────────────────────────────────────────────────────────
async function signIn() {
  clearMsg();
  const email = document.getElementById("li-email").value.trim();
  const pass  = document.getElementById("li-pass").value;
  if (!email || !pass) { showMsg("Please fill in all fields.", "error"); return; }
  try {
    await auth.signInWithEmailAndPassword(email, pass);
  } catch (e) { showMsg(friendlyError(e), "error"); }
}

// ── Promo code lookup ─────────────────────────────────────────────────────
// Returns { referredBy, referredByUid } or {} if not found / invalid
async function resolvePromoCode(code) {
  if (!code) return {};
  try {
    const snap = await db.collection("promoCodes").doc(code).get();
    if (snap.exists) {
      const d = snap.data();
      return { referredBy: code, referredByUid: d.uid || null };
    }
  } catch (e) { /* ignore — promo code lookup failure is non-fatal */ }
  return {};
}

// ── Sign Up ──────────────────────────────────────────────────────────────
async function signUp() {
  clearMsg();
  const email = document.getElementById("su-email").value.trim();
  const pass  = document.getElementById("su-pass").value;
  const pass2 = document.getElementById("su-pass2").value;
  const hint  = document.getElementById("su-hint").value.trim();
  if (!email || !pass || !pass2) { showMsg("Please fill in all fields.", "error"); return; }
  if (pass !== pass2)  { showMsg("Passwords do not match.", "error"); return; }
  if (pass.length < 8) { showMsg("Password must be at least 8 characters.", "error"); return; }

  const planCfg = PLANS[planParam] || null;
  let tier   = planCfg ? planCfg.tier   : "none";
  let status = planCfg ? planCfg.status : "pending";

  try {
    const cred = await auth.createUserWithEmailAndPassword(email, pass);
    const uid  = cred.user.uid;

    // Check if admin pre-invited this email — inherit their tier/status/promoCode
    let inheritedPromoCode = "";
    const pendingSnap = await db.collection("users").where("email", "==", email).get();
    pendingSnap.forEach(doc => {
      if (doc.id.startsWith("pending_")) {
        tier   = doc.data().tier               || tier;
        status = doc.data().subscriptionStatus || status;
        if (doc.data().promoCode) inheritedPromoCode = doc.data().promoCode;
        doc.ref.delete().catch(() => {});
      }
    });

    // Resolve referral promo code (from URL or marketer registration)
    const refData = promoParam ? await resolvePromoCode(promoParam) : {};

    // Build user doc
    const userDoc = {
      email,
      tier,
      subscriptionStatus: status,
      plan:         planParam || "none",
      securityHint: hint,
      createdAt:    firebase.firestore.FieldValue.serverTimestamp(),
      lastLoginAt:  firebase.firestore.FieldValue.serverTimestamp(),
      source:       "self_registered",
    };
    // If this user is a marketer, store their promo code
    if (tier === "marketer" && inheritedPromoCode) {
      userDoc.promoCode = inheritedPromoCode;
      // Update promoCodes collection with their real UID now that they've registered
      db.collection("promoCodes").doc(inheritedPromoCode).set(
        { uid: uid, email, updatedAt: firebase.firestore.FieldValue.serverTimestamp() },
        { merge: true }
      ).catch(() => {});
    }
    // If referred by a marketer, store referral info
    if (refData.referredBy) {
      userDoc.referredBy    = refData.referredBy;
      userDoc.referredByUid = refData.referredByUid || null;
    }
    await db.collection("users").doc(uid).set(userDoc);

    if (planParam === "free") {
      showMsg("✅ Welcome! Redirecting to home…", "success");
      setTimeout(() => window.location.href = BLEE_PAGES.home, 1600);
    } else {
      showMsg("✅ Account created! Redirecting…", "success");
      setTimeout(() => {
        window.location.href = BLEE_PAGES.subscribe + "?registered=1&plan=" + (planParam || "starter");
      }, 1400);
    }
  } catch (e) { showMsg(friendlyError(e), "error"); }
}

// ── Google Sign-In ───────────────────────────────────────────────────────
async function signInGoogle() {
  clearMsg();
  try {
    const result = await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
    const user   = result.user;
    const snap   = await db.collection("users").doc(user.uid).get();

    if (!snap.exists) {
      const planCfg = PLANS[planParam] || null;
      let tier   = planCfg ? planCfg.tier   : "none";
      let status = planCfg ? planCfg.status : "pending";

      let gInheritedPromo = "";
      const pendingSnap = await db.collection("users").where("email", "==", user.email).get();
      pendingSnap.forEach(doc => {
        if (doc.id.startsWith("pending_")) {
          tier   = doc.data().tier               || tier;
          status = doc.data().subscriptionStatus || status;
          if (doc.data().promoCode) gInheritedPromo = doc.data().promoCode;
          doc.ref.delete().catch(() => {});
        }
      });

      const gRefData = promoParam ? await resolvePromoCode(promoParam) : {};
      const gDoc = {
        email: user.email, tier, subscriptionStatus: status,
        plan: planParam || "none", securityHint: "",
        createdAt:   firebase.firestore.FieldValue.serverTimestamp(),
        lastLoginAt: firebase.firestore.FieldValue.serverTimestamp(),
        source: "google",
      };
      if (tier === "marketer" && gInheritedPromo) {
        gDoc.promoCode = gInheritedPromo;
        db.collection("promoCodes").doc(gInheritedPromo).set(
          { uid: user.uid, email: user.email,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp() },
          { merge: true }
        ).catch(() => {});
      }
      if (gRefData.referredBy) {
        gDoc.referredBy    = gRefData.referredBy;
        gDoc.referredByUid = gRefData.referredByUid || null;
      }
      await db.collection("users").doc(user.uid).set(gDoc);

      window.location.href = planParam === "free"
        ? BLEE_PAGES.home
        : BLEE_PAGES.subscribe + "?registered=1&plan=" + (planParam || "starter");
      return;
    }
    // Existing user — onAuthStateChanged redirects
  } catch (e) { showMsg(friendlyError(e), "error"); }
}

async function forgotPassword() {
  const email = document.getElementById("li-email").value.trim();
  if (!email) { showMsg("Enter your email address first.", "error"); return; }
  try {
    await auth.sendPasswordResetEmail(email);
    showMsg("Password reset email sent — check your inbox.", "success");
  } catch (e) { showMsg(friendlyError(e), "error"); }
}

function friendlyError(e) {
  const map = {
    "auth/user-not-found":       "No account found with that email.",
    "auth/wrong-password":       "Incorrect password.",
    "auth/email-already-in-use": "An account with this email already exists. Sign in instead.",
    "auth/invalid-email":        "Invalid email address.",
    "auth/weak-password":        "Password is too weak (min 8 characters).",
    "auth/too-many-requests":    "Too many attempts. Try again later.",
    "auth/popup-closed-by-user": "Google sign-in was cancelled.",
  };
  return map[e.code] || e.message;
}
</script>
</body>
</html>
